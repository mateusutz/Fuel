<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#0E1411" />
  <title>Fuel — Nutrição</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Fuel" />

  <!-- Fontes: Barlow Condensed (números/títulos) + Inter (corpo). Com fallback de sistema se offline. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; }
    body {
      background: #0E1411;
      color: #ECEFEA;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior-y: none;
    }
    #root { min-height: 100dvh; }
    input, select, button { font-family: inherit; }
    /* Estado de carregamento antes do React montar */
    #boot {
      display: flex; align-items: center; justify-content: center;
      min-height: 100dvh; color: #8B968D; font-size: 15px;
    }
  </style>
</head>
<body>
  <div id="root"><div id="boot">Carregando o Fuel…</div></div>

  <!-- React 18 (UMD) + Babel standalone, tudo via CDN, sem etapa de build -->
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>

  <!-- Dados da TACO (semente de alimentos). Script comum: executa antes do app. -->
  <script src="dados-taco.js"></script>

  <!-- O app inteiro. Babel transpila no runtime CLASSIC (React.createElement). -->
  <script type="text/babel" data-presets="react" src="app.js"></script>

  <!-- Registro do service worker (caminho relativo para funcionar em /Fuel/) -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').catch(function (e) {
          console.warn('Falha ao registrar o service worker:', e);
        });
      });
    }
  </script>
</body>
</html>
