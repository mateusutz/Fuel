<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#0B0F19" />
  <title>Fuel — Nutrição</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Fuel" />

  <!-- Fontes: Barlow Condensed (números/títulos) + Inter (corpo). Com fallback de sistema se offline. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; }
    body {
      background: #0B0F19;
      color: #f0f0f2;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior-y: none;
    }
    #root { min-height: 100dvh; }
    input, select, button { font-family: inherit; }
    button:focus-visible { outline: 2px solid #2FBF6E; outline-offset: 2px; }
    input:focus, textarea:focus, select:focus { border-color: #2FBF6E; }
    @keyframes fds-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes fds-pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(0.86); opacity: 0.62; } }
    .fds-dots::after { content: ""; animation: fds-dots 1.4s steps(1) infinite; }
    @keyframes fds-dots { 0% { content: ""; } 25% { content: "."; } 50% { content: ".."; } 75% { content: "..."; } 100% { content: ""; } }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
    /* Estado de carregamento antes do React montar */
    #boot {
      display: flex; align-items: center; justify-content: center;
      min-height: 100dvh; color: #5a5a62; font-size: 15px;
    }
  </style>
</head>
<body>
  <div id="root"><div id="boot">Carregando o Fuel…</div></div>

  <!-- React 18 (UMD) + Babel standalone, tudo via CDN, sem etapa de build -->
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>

  <!-- Firebase (compat: expõe `firebase` global, funciona sem bundler) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script>
    // Configuração pública do projeto Fuel (protegida pelas Security Rules do Firestore).
    try {
      var firebaseConfig = {
        apiKey: "AIzaSyA48iJH0Yq1OhlTeKeaJq1c6_Ect230XC8",
        authDomain: "fuel-14edd.firebaseapp.com",
        projectId: "fuel-14edd",
        storageBucket: "fuel-14edd.firebasestorage.app",
        messagingSenderId: "69794973140",
        appId: "1:69794973140:web:d31a13ecf9b6fabeb38241"
      };
      firebase.initializeApp(firebaseConfig);
      // Cache offline nativo: funciona sem internet e sincroniza ao reconectar.
      firebase.firestore().enablePersistence({ synchronizeTabs: true }).catch(function (e) {
        console.warn("Persistência offline indisponível:", e && e.code);
      });
      window.fbAuth = firebase.auth();
      window.fbDb = firebase.firestore();
    } catch (e) { console.error("Falha ao iniciar Firebase:", e); }
  </script>

  <!-- Dados da TACO (semente de alimentos). Script comum: executa antes do app. -->
  <script src="dados-taco.js"></script>

  <!-- O app inteiro. Babel transpila no runtime CLASSIC (React.createElement). -->
  <script type="text/babel" data-presets="react" src="app.js"></script>

  <!-- Registro do service worker (caminho relativo para funcionar em /Fuel/) -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').catch(function (e) {
          console.warn('Falha ao registrar o service worker:', e);
        });
      });
    }
  </script>
</body>
</html>
